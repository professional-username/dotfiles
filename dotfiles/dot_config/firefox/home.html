<html>
  <head>
    <style>
      :root {
        --fg: #cdd6f4;
        --bg: #1e1e2e;
      }

      * {
        all: none;
        color: var(--fg);
        text-align: center;
      }

      body {
        background-color: var(--bg);
      }

      .external {
        display: table;
        position: absoulte;
        top: 0;
        left: 0;
        height: 100%;
        width: 100%;
      }

      .middle {
        display: table-cell;
        vertical-align: middle;
      }

      .content {
        margin-left: auto;
        margin-right: auto;
        display: grid;
        grid-template-columns: auto auto auto auto auto;
        grid-gap: 15px;
        justify-content: center;
      }

      .cell {
        border: 3px solid var(--fg);
        padding: 20px;
        width: 110px;
        height: 110px;
        transition: 0.3s;
        text-decoration: none;
      }

      .cell:hover {
        background-color: var(--fg);
      }

      .cell:hover * {
        color: var(--bg);
      }

      .blank {
        width: 153px;
        height: 153px;
      }

      h1 {
        margin: 0px;
        font-size: 20px;
      }

      h2 {
        margin: 10px;
        font-size: 40px;
      }

      h3 {
        margin: 0px;
        font-size: 15px;
      }

      form {
        width: 836px;
        border: 3px solid var(--fg);
        margin: auto;
        margin-bottom: 15px;
        display: grid;
        grid-template-columns: auto auto;
        grid-gap: 0px;
        justify-content: left;
      }

      input {
        all: unset;
        margin-left: 10px;
        text-align: left;
        font-size: 22px;
        width: 780px;
      }

      button {
        all: unset;
        margin-left: 5px;
        font-size: 30px;
        width: 30px;
      }

      h4 {
        font-size: 40px;
      }
    </style>
    <title>Home</title>
  </head>

              required
            />
          </form>
        </div>
        <div class="content">

</html>
